global
    daemon

defaults
    mode http

    timeout connect 5s
    timeout client 30s
    timeout server 30s

frontend web
    bind *:80

    default_backend apps

backend apps

    balance roundrobin
    option httpchk GET /health

    server app1 app1:8000 check inter 5s
    server app2 app2:8000 check inter 5s
    server app3 app3:8000 check inter 5s

listen stats

    bind *:8404

    stats enable
    stats uri /
    stats refresh 5s
