version: "3.9"

services:
  app1:
    build: ./app1
    container_name: app1

  app2:
    build: ./app2
    container_name: app2

  app3:
    build: ./app3
    container_name: app3

  haproxy:
    image: haproxy:3.0
    container_name: haproxy
    ports:
      - "8081:80"
      - "8404:8404"
    volumes:
      - ./haproxy/round_robin.cfg:/usr/local/etc/haproxy/haproxy.cfg
    depends_on:
      - app1
      - app2
      - app3
